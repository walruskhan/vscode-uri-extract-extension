name: Release

# Trigger by pushing a versioned release tag, e.g.:
#   git tag release-2026-03-27-A && git push origin release-2026-03-27-A
on:
  push:
    tags:
      - 'release-*'

jobs:
  release:
    name: Test and release
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required to create a GitHub Release

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compile
        run: pnpm run compile

      - name: Run tests
        run: pnpm test

      - name: Package extension
        run: pnpm exec vsce package --no-dependencies

      - name: Create source zip
        run: |
          VERSION=$(node -p "require('./package.json').version")
          git archive --format=zip HEAD -o "vscode-uri-extract-${VERSION}.zip"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION=$(node -p "require('./package.json').version")
          gh release create "${TAG}" \
            --title "${TAG}" \
            --notes "Release ${TAG}" \
            "vscode-uri-extract-${VERSION}.vsix" \
            "vscode-uri-extract-${VERSION}.zip"
