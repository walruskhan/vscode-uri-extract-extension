name: Release

# Trigger by pushing the 'release' tag to master:
#   git tag release && git push origin release
# To re-release, delete the old tag first:
#   git push origin :release && git tag -f release && git push origin release
on:
  push:
    tags:
      - release

jobs:
  release:
    name: Test and publish
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required to create a GitHub Release

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compile
        run: pnpm run compile

      - name: Run tests
        run: pnpm test

      - name: Package extension
        run: pnpm exec vsce package --no-dependencies

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          VSIX=$(ls *.vsix)
          gh release create "release-${VERSION}" \
            --title "v${VERSION}" \
            --notes "Release v${VERSION}" \
            "$VSIX"

      - name: Publish to VS Code Marketplace
        if: ${{ secrets.VSCE_PAT != '' }}
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: pnpm exec vsce publish --pat "$VSCE_PAT" --no-dependencies
