name: Release

# Trigger by pushing the 'release' tag to master:
#   git tag release && git push origin release
# To re-release, delete the old tag first:
#   git push origin :release && git tag -f release && git push origin release
on:
  push:
    tags:
      - release

jobs:
  release:
    name: Test and release
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required to create a GitHub Release

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compile
        run: pnpm run compile

      - name: Run tests
        run: pnpm test

      - name: Package extension
        run: pnpm exec vsce package --no-dependencies

      - name: Create source zip
        run: |
          VERSION=$(node -p "require('./package.json').version")
          git archive --format=zip HEAD -o "vscode-uri-extract-${VERSION}.zip"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          gh release create "release-${VERSION}" \
            --title "v${VERSION}" \
            --notes "Release v${VERSION}" \
            "vscode-uri-extract-${VERSION}.vsix" \
            "vscode-uri-extract-${VERSION}.zip"
